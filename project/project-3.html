<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站静态首页示例</title>
  <link rel="stylesheet" href="./css/pro-3.css">
</head>
<body>
  <!-- 顶部搜索和导航 -->
  <header class="header">
    <div class="logo">bilibili</div>
    <nav class="nav">
      <ul>
        <li>首页</li>
        <li>番剧</li>
        <li>直播</li>
        <li>游戏中心</li>
        <li>会员购</li>
        <li>漫画</li>
        <li>赛事</li>
        <li>下载客户端</li>
      </ul>
    </nav>
    <div class="search">
      <input type="text" placeholder="吉罗很快乐">
      <button>搜索</button>
    </div>
  </header>

  <!-- 分类标签 -->
  <div class="categories">
    <button>动态</button>
    <button class="active">热门</button>
    <button>番剧</button>
    <button>国创</button>
    <button>综艺</button>
    <button>动画</button>
    <button>鬼畜</button>
    <button>舞蹈</button>
    <button>娱乐</button>
    <button>科技数码</button>
    <button>美食</button>
    <button>汽车</button>
    <button>体育运动</button>
    <button>更多</button>
  </div>

  <!-- 视频推荐区域 -->
  <main class="video-grid">
    <!-- 第一大图 -->
    <div class="video-item big">
      <img src="https://via.placeholder.com/600x300?text=高考压轴题" alt="高考压轴题">
      <div class="video-title">葛军老师教你手把手拆解高考数学压轴题&gt;&gt;&gt;</div>
    </div>

    <!-- 右侧小图视频 -->
    <div class="video-item">
      <img src="https://via.placeholder.com/300x180?text=精卫" alt="精卫">
      <div class="video-title">广广大网友要求，《精卫》完整版来了～</div>
    </div>

    <div class="video-item">
      <img src="https://via.placeholder.com/300x180?text=喜灰游戏" alt="喜灰游戏">
      <div class="video-title">喜灰同人又一力作！喜澈被困地牢反目成仇！</div>
    </div>

    <div class="video-item">
      <img src="https://via.placeholder.com/300x180?text=龙虎争斗" alt="龙虎争斗">
      <div class="video-title">陈浩南脚踩黑白两道！O记亮对东星实施定点清除！</div>
    </div>

    <div class="video-item">
      <img src="https://via.placeholder.com/300x180?text=MacBook" alt="MacBook">
      <div class="video-title">“无头骑士”MacBook该怎么玩？我找到了它的最佳搭档…</div>
    </div>

    <div class="video-item">
      <img src="https://via.placeholder.com/300x180?text=化学物理" alt="化学物理">
      <div class="video-title">华强买瓜 但过度的化学物理数学生物术语</div>
    </div>
  </main>
</body>
</html>
